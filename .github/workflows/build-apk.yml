name: Build APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      architectures:
        description: 'Arquitecturas'
        required: false
        default: 'arm64-v8a,armeabi-v7a'
        type: string

jobs:
  build:
    name: Compilar APK Android
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: ☕ Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 🤖 Setup Android SDK
        id: android-sdk
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-36
            build-tools;36.0.0
            ndk;27.1.12297006
            cmake;3.22.1
            platform-tools

      - name: 📋 Crear local.properties
        run: |
          echo "sdk.dir=${{ steps.android-sdk.outputs.sdk-path }}" > android/local.properties
          echo "ndk.dir=${{ steps.android-sdk.outputs.ndk-path }}" >> android/local.properties

      - name: 🔧 Permisos gradlew
        run: chmod +x android/gradlew

      - name: 🏗️ Compilar APK Release
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ steps.android-sdk.outputs.sdk-path }}
          ANDROID_SDK_ROOT: ${{ steps.android-sdk.outputs.sdk-path }}
          ORG_GRADLE_PROJECT_newArchEnabled: 'true'
          ORG_GRADLE_PROJECT_hermesEnabled: 'true'
          ORG_GRADLE_PROJECT_reactNativeArchitectures: ${{ github.event.inputs.architectures || 'arm64-v8a,armeabi-v7a' }}

      - name: 📱 Localizar APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "APK: $APK"
          ls -lh "$APK"

      - name: 📤 Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: MecanicosYa-APK
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30
          compression-level: 0
